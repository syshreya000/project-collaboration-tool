<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">

        <div class="logo">
            <i class="fa-solid fa-layer-group"></i>
            <h2>CollabTool</h2>
        </div>

        <ul>

            <li>
                <a href="index.html">
                    <i class="fa-solid fa-house"></i>
                    Dashboard
                </a>
            </li>

            <li>
                <a href="projects.html">
                    <i class="fa-solid fa-folder"></i>
                    Projects
                </a>
            </li>

            <li>
                <a href="kanban.html">
                    <i class="fa-solid fa-table-columns"></i>
                    Kanban
                </a>
            </li>

            <li>
                <a href="team.html">
                    <i class="fa-solid fa-users"></i>
                    Team
                </a>
            </li>

            <li>
                <a href="timeline.html">
                    <i class="fa-solid fa-calendar-days"></i>
                    Timeline
                </a>
            </li>

            <li class="active">
                <a href="chat.html">
                    <i class="fa-solid fa-comments"></i>
                    Chat
                </a>
            </li>

        </ul>

    </div>

    <!-- Main -->
    <div class="main">

        <div class="welcome">
            <h1>Team Chat 💬</h1>
            <p>Collaborate and communicate with your team.</p>
        </div>

        <div class="chat-box">

            <div class="message received">
                <strong>Rahul:</strong>
                Hi team, dashboard design is completed.
            </div>

            <div class="message sent">
                <strong>Shreya:</strong>
                Great! Please share the files.
            </div>

            <div class="message received">
                <strong>Priya:</strong>
                I have uploaded the design assets.
            </div>

            <div class="chat-input">
                <input type="text" placeholder="Type a message...">
                <button>Send</button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
